<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ═══ Primary SEO ═══ -->
  <title>PyrunAi | AI Automation, Data Analytics & Business Intelligence Solutions</title>
  <meta name="description" content="PyrunAi delivers enterprise-grade AI automation, machine learning, data analytics, Power BI dashboards, and web development solutions to help organizations make smarter, data-driven decisions." />

  <meta name="author" content="PyrunAi" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#16a34a" />

  <!-- ═══ Canonical URL ═══ -->
  <link rel="canonical" href="https://www.pyrunai.com/" />

  <!-- ═══ Geo Tags — Nashik, Maharashtra, India ═══ -->
  <meta name="geo.region" content="IN-MH" />
  <meta name="geo.placename" content="Nashik, Maharashtra, India" />
  <meta name="geo.position" content="19.9975;73.7898" />
  <meta name="ICBM" content="19.9975, 73.7898" />

  <!-- ═══ Open Graph — LinkedIn / Facebook ═══ -->
  <meta property="og:site_name" content="PyrunAi" />
  <meta property="og:title" content="PyrunAi | AI Automation & Data Analytics Solutions" />
  <meta property="og:description" content="Enterprise AI automation, machine learning, BI dashboards, and data analytics solutions to transform your business." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.pyrunai.com/" />

  <meta property="og:image:alt" content="PyrunAi — AI Automation & Data Analytics Solutions" />
  <meta property="og:locale" content="en_US" />

  <!-- ═══ Twitter Card ═══ -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@PyrunAi" />
  <meta name="twitter:title" content="PyrunAi | AI Automation & Data Analytics Solutions" />

  <meta name="twitter:image" content="https://www.pyrunai.com/preview.png" />
  <meta name="twitter:image:alt" content="PyrunAi — AI Automation & Data Analytics Solutions" />

  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

  <!-- ═══ Fonts ═══ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- ═══ Structured Data — TechCompany schema for Google ═══ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TechCompany",
    "name": "PyrunAi",
    "url": "https://www.pyrunai.com",
    "logo": "https://www.pyrunai.com/images/PyrunAi_FullLogo.svg",

    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Nashik",
      "addressRegion": "Maharashtra",
      "addressCountry": "IN"
    },
    "sameAs": [
      "https://www.linkedin.com/company/pyrunai",
      "https://twitter.com/PyrunAi"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer support",
      "url": "https://www.pyrunai.com/contact"
    }
  }
  </script>

</head>
